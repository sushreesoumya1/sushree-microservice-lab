apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-service
  namespace: mls-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activity-service
  template:
    metadata:
      labels:
        app: activity-service
    spec:
      containers:
        - name: activity-service
          image: activity-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082